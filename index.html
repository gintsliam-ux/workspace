<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odds Matching Dashboard</title>
<style>
  :root {
    --bg: #0a0e17; --card: #111827; --card2: #162033;
    --border: #2a3a5c; --border2: #1a2540;
    --text: #e0e0e0; --muted: #6b7fa3; --dim: #4a6080;
    --blue: #4a9eff; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: linear-gradient(135deg, #0d1525 0%, #1a2540 100%); border-bottom: 2px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; white-space: nowrap; }
  header h1 b { color: var(--blue); }

  /* Sport Tabs */
  .sport-tabs { display: flex; gap: 4px; }
  .sport-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--muted); transition: all .2s; display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .sport-tab:hover { border-color: var(--blue); color: var(--text); }
  .sport-tab.active { background: rgba(74,158,255,0.12); border-color: var(--blue); color: #fff; }
  .sport-tab .icon { font-size: 16px; }
  .tab-badge {
    background: var(--blue); color: #fff; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; font-weight: 700; min-width: 20px; text-align: center;
  }

  /* Header right */
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-info { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .settings-btn {
    background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--muted); font-size: 16px; padding: 6px 10px; cursor: pointer; transition: all .2s;
  }
  .settings-btn:hover { color: var(--blue); border-color: var(--blue); }

  /* Settings Panel */
  .settings-panel {
    display: none; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin: 0 32px; position: relative;
  }
  .settings-panel.open { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-group label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .setting-group input, .setting-group select {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); padding: 4px 8px; font-size: 12px; width: 80px;
  }

  /* Main */
  main { padding: 20px 32px; max-width: 1800px; margin: 0 auto; }
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Notice banner */
  .notice {
    background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: var(--yellow);
  }

  /* Match List */
  .section-header { font-size: 16px; margin-bottom: 14px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .badge { background: var(--blue); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 600; }
  .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .match-card {
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer;
    transition: all .2s;
  }
  .match-card:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .match-card .mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .match-card .mc-time { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .match-card .mc-status { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .mc-status.upcoming { background: rgba(74,158,255,0.15); color: var(--blue); }
  .mc-status.final { background: rgba(52,211,153,0.15); color: var(--green); }
  .match-card .mc-teams { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .match-card .mc-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }
  .mc-meta .mc-score { color: var(--green); font-weight: 600; }
  .mc-meta .mc-mkts { color: var(--dim); }

  /* Market Detail View */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .back-btn {
    background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--muted); font-size: 12px; padding: 6px 14px; cursor: pointer;
    transition: all .2s; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--blue); border-color: var(--blue); }
  .detail-header {
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px;
  }
  .detail-header .dh-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .detail-header .dh-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
  .dh-meta .dh-score { color: var(--green); font-weight: 600; }

  /* Market group */
  .market-group { margin-bottom: 24px; }
  .market-group-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--yellow); margin-bottom: 8px; padding-left: 4px;
  }

  /* Odds Table */
  .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .table-wrapper::-webkit-scrollbar { height: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: #0d1525; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .odds-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .odds-table th {
    text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); border-bottom: 2px solid var(--border);
    background: #0d1525; position: sticky; top: 0; z-index: 1; cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  .odds-table th:hover { color: var(--blue); }
  .odds-table th .sort-arrow { font-size: 9px; margin-left: 3px; color: var(--blue); }
  .odds-table td { padding: 6px 10px; border-bottom: 1px solid var(--border2); white-space: nowrap; }
  .odds-table tr:hover td { background: rgba(74,158,255,0.03); }
  .odds-table .question-cell { color: #fff; font-weight: 600; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
  .odds-table .line-cell { color: var(--yellow); font-weight: 600; }
  .odds-table .outcome-cell { color: var(--text); max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  .odds-table .odds-val { font-weight: 500; }
  .odds-table .null-val { color: var(--dim); }
  .odds-table .highlight-red { background: rgba(248,113,113,0.15); color: var(--red); font-weight: 600; }
  .odds-table .prob-cell { color: var(--purple); }

  /* Grouping rows */
  .odds-table .group-row td { border-bottom: 2px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><b>Odds</b> Matching</h1>
    <div class="sport-tabs" id="sport-tabs"></div>
  </div>
  <div class="header-right">
    <div class="refresh-info"><div class="refresh-dot"></div><span id="refresh-countdown">30s</span></div>
    <button class="settings-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>
  </div>
</header>

<div class="settings-panel" id="settings-panel">
  <div class="setting-group">
    <label>Refresh (s)</label>
    <input type="number" id="cfg-refresh" value="30" min="5" max="300" onchange="updateConfig()">
  </div>
  <div class="setting-group">
    <label>Discrepancy threshold</label>
    <input type="number" id="cfg-threshold" value="0.10" step="0.01" min="0" onchange="updateConfig()">
  </div>
</div>

<main>
  <div id="loading" class="loading"><div class="spinner"></div><div id="load-msg">Loading...</div></div>
  <div id="match-list-view" style="display:none"></div>
  <div id="detail-view" class="detail-view"></div>
</main>

<script>
const SB_URL = 'https://ugvwiyhdyqekahizwuhg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVndndpeWhkeXFla2FoaXp3dWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMTcyNzAsImV4cCI6MjA4NDU5MzI3MH0.vf4FlW327rHxApBV2NtDvw_EUAHmymp-msU8HxkQuIo';

// ---- Config ----
let CFG = { refreshInterval: 30, threshold: 0.10 };
function updateConfig() {
  CFG.refreshInterval = Math.max(5, parseInt(document.getElementById('cfg-refresh').value) || 30);
  CFG.threshold = parseFloat(document.getElementById('cfg-threshold').value) || 0.10;
  resetRefreshTimer();
}
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

// ---- Sport Configuration ----
const SPORTS = {
  nhl: {
    label: 'NHL', icon: '\u{1F3D2}',
    eventsTable: 'nhl_events',
    marketsTable: 'nhl_markets',
    marketSelect: 'event_slug,question,sports_market_type,line,outcome_1_name,outcome_1_pinn_odds,outcome_2_name,outcome_2_pinn_odds,winning_outcome,outcome_1_current_odds,outcome_2_current_odds',
    books: [
      { key: 'pinn', label: 'Pinnacle', col1: 'outcome_1_pinn_odds', col2: 'outcome_2_pinn_odds' },
      { key: 'current', label: 'Current', col1: 'outcome_1_current_odds', col2: 'outcome_2_current_odds' },
    ],
    fairBooks: [],
    hasProbs: false,
    hasWinner: true,
    marketTypes: ['moneyline', 'spreads', 'totals'],
  },
  nba: {
    label: 'NBA', icon: '\u{1F3C0}',
    eventsTable: 'nba_events',
    marketsTable: 'nba_markets',
    marketSelect: 'event_slug,question,sports_market_type,line,outcome_1_name,outcome_1_pinn_odds,outcome_2_name,outcome_2_pinn_odds,winning_outcome',
    books: [
      { key: 'pinn', label: 'Pinnacle', col1: 'outcome_1_pinn_odds', col2: 'outcome_2_pinn_odds' },
    ],
    fairBooks: [],
    hasProbs: false,
    hasWinner: true,
    marketTypes: ['moneyline', 'spreads', 'totals', 'first_half_moneyline', 'first_half_spreads', 'first_half_totals', 'points', 'rebounds'],
  },
  nfl: {
    label: 'NFL', icon: '\u{1F3C8}',
    eventsTable: 'nfl_events',
    marketsTable: 'nfl_odds_matching',
    marketSelect: 'event_slug,question,sports_market_type,line,outcome_1_name,outcome_1_pinn_odds,outcome_2_name,outcome_2_pinn_odds,outcome_1_fanduel_odds,outcome_2_fanduel_odds,outcome_1_fanatics_odds,outcome_2_fanatics_odds,outcome_1_pinn_fair,outcome_2_pinn_fair,outcome_1_fanduel_fair,outcome_2_fanduel_fair,outcome_1_fanatics_fair,outcome_2_fanatics_fair,outcome_1_original_prob,outcome_2_original_prob,outcome_1_fair_prob,outcome_2_fair_prob',
    books: [
      { key: 'pinn', label: 'Pinnacle', col1: 'outcome_1_pinn_odds', col2: 'outcome_2_pinn_odds' },
      { key: 'fanduel', label: 'FanDuel', col1: 'outcome_1_fanduel_odds', col2: 'outcome_2_fanduel_odds' },
      { key: 'fanatics', label: 'Fanatics', col1: 'outcome_1_fanatics_odds', col2: 'outcome_2_fanatics_odds' },
    ],
    fairBooks: [
      { key: 'pinn_fair', label: 'Pinn Fair', col1: 'outcome_1_pinn_fair', col2: 'outcome_2_pinn_fair' },
      { key: 'fanduel_fair', label: 'FD Fair', col1: 'outcome_1_fanduel_fair', col2: 'outcome_2_fanduel_fair' },
      { key: 'fanatics_fair', label: 'Fan Fair', col1: 'outcome_1_fanatics_fair', col2: 'outcome_2_fanatics_fair' },
    ],
    hasProbs: true,
    hasWinner: false,
    marketTypes: ['moneyline', 'spreads', 'totals'],
  },
};

// ---- State ----
let activeSport = 'nhl';
let sportData = {};    // { nhl: { events, markets, grouped }, ... }
let currentSlug = null; // selected match slug for detail view
let upcomingCounts = {};
let refreshTimer = null;
let countdown = 30;

// ---- Data Layer ----
const msg = t => { const e = document.getElementById('load-msg'); if (e) e.textContent = t; };

async function q(table, params = '', range = null) {
  const headers = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
  if (range) headers.Range = range;
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers });
  if (!r.ok) throw new Error(`API ${r.status}: ${table}`);
  return r.json();
}

async function qAll(table, params = '') {
  const PG = 1000; let all = [], off = 0;
  while (true) {
    const page = await q(table, params, `${off}-${off + PG - 1}`);
    all = all.concat(page);
    if (page.length < PG) break;
    off += PG;
  }
  return all;
}

async function loadSport(key) {
  const cfg = SPORTS[key];
  msg(`Loading ${cfg.label} events...`);

  const [upcoming, completed] = await Promise.all([
    q(cfg.eventsTable, 'select=slug,title,start_time_utc,score&score=is.null&order=start_time_utc.asc&limit=500'),
    q(cfg.eventsTable, 'select=slug,title,start_time_utc,score&score=not.is.null&order=start_time_utc.desc&limit=200'),
  ]);

  const events = [...upcoming, ...completed];
  const slugs = events.map(e => e.slug);

  msg(`Loading ${cfg.label} markets...`);
  const markets = await qAll(cfg.marketsTable, `select=${cfg.marketSelect}`);

  // Group markets by event_slug
  const grouped = {};
  for (const m of markets) {
    if (!grouped[m.event_slug]) grouped[m.event_slug] = [];
    grouped[m.event_slug].push(m);
  }

  sportData[key] = { events, upcoming, completed, markets, grouped };
  upcomingCounts[key] = upcoming.length;
  return sportData[key];
}

// ---- Utilities ----
function fmtDate(u) {
  if (!u) return 'TBD';
  const d = new Date(u);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function fmtOdds(v) { return v != null ? v.toFixed(2) : '-'; }
function fmtProb(v) { return v != null ? v.toFixed(1) + '%' : '-'; }

// ---- Render Sport Tabs ----
function renderTabs() {
  const container = document.getElementById('sport-tabs');
  container.innerHTML = Object.entries(SPORTS).map(([key, cfg]) => {
    const cnt = upcomingCounts[key];
    const badge = cnt !== undefined ? `<span class="tab-badge">${cnt}</span>` : '';
    return `<div class="sport-tab ${key === activeSport ? 'active' : ''}" data-sport="${key}" onclick="switchSport('${key}')">
      <span class="icon">${cfg.icon}</span>${cfg.label}${badge}
    </div>`;
  }).join('');
}

// ---- Render Match List ----
function renderMatchList() {
  const data = sportData[activeSport];
  if (!data) return;
  const cfg = SPORTS[activeSport];
  const listEl = document.getElementById('match-list-view');

  let html = '';

  // Show upcoming
  if (data.upcoming.length > 0) {
    html += `<div class="section-header">Upcoming <span class="badge">${data.upcoming.length}</span></div>`;
    html += '<div class="match-grid">';
    for (const ev of data.upcoming) {
      const mkts = data.grouped[ev.slug] || [];
      html += renderMatchCard(ev, mkts, false);
    }
    html += '</div>';
  } else {
    html += `<div class="notice">No upcoming ${cfg.label} events. Showing recent completed games.</div>`;
  }

  // Show completed (recent)
  const showCompleted = data.upcoming.length === 0 ? data.completed : data.completed.slice(0, 20);
  if (showCompleted.length > 0) {
    html += `<div class="section-header">Completed <span class="badge">${showCompleted.length}</span></div>`;
    html += '<div class="match-grid">';
    for (const ev of showCompleted) {
      const mkts = data.grouped[ev.slug] || [];
      html += renderMatchCard(ev, mkts, true);
    }
    html += '</div>';
  }

  listEl.innerHTML = html;
  listEl.style.display = '';
}

function renderMatchCard(ev, mkts, isCompleted) {
  const isFinal = !!ev.score;
  const statusClass = isFinal ? 'final' : 'upcoming';
  const statusText = isFinal ? 'Final' : 'Upcoming';
  const mktCount = mkts.length;
  const typeSet = new Set(mkts.map(m => m.sports_market_type));
  const typeList = [...typeSet].join(', ');

  return `<div class="match-card" onclick="openDetail('${ev.slug}')">
    <div class="mc-header">
      <span class="mc-time">${fmtDate(ev.start_time_utc)}</span>
      <span class="mc-status ${statusClass}">${statusText}</span>
    </div>
    <div class="mc-teams">${ev.title}</div>
    <div class="mc-meta">
      ${isFinal ? `<span class="mc-score">${ev.score}</span>` : ''}
      <span class="mc-mkts">${mktCount} markets${typeList ? ' \u00b7 ' + typeList : ''}</span>
    </div>
  </div>`;
}

// ---- Render Market Detail ----
function openDetail(slug) {
  currentSlug = slug;
  const data = sportData[activeSport];
  const cfg = SPORTS[activeSport];
  const ev = data.events.find(e => e.slug === slug);
  if (!ev) return;

  const mkts = data.grouped[slug] || [];
  const detailEl = document.getElementById('detail-view');
  document.getElementById('match-list-view').style.display = 'none';
  detailEl.classList.add('active');

  let html = `<button class="back-btn" onclick="closeDetail()">\u2190 Back to matches</button>`;
  html += `<div class="detail-header">
    <div class="dh-title">${ev.title}</div>
    <div class="dh-meta">
      <span>${fmtDate(ev.start_time_utc)}</span>
      ${ev.score ? `<span class="dh-score">Final: ${ev.score}</span>` : '<span>Upcoming</span>'}
    </div>
  </div>`;

  // Group markets by type, preserve order from config
  const byType = {};
  for (const m of mkts) {
    const t = m.sports_market_type;
    if (!byType[t]) byType[t] = [];
    byType[t].push(m);
  }

  // Render in preferred order
  const typeOrder = cfg.marketTypes;
  const allTypes = [...new Set([...typeOrder, ...Object.keys(byType)])];

  for (const type of allTypes) {
    const rows = byType[type];
    if (!rows || rows.length === 0) continue;

    html += `<div class="market-group">
      <div class="market-group-title">${formatMarketType(type)} <span style="font-weight:400;color:var(--dim);font-size:11px">(${rows.length})</span></div>`;
    html += renderOddsTable(rows, cfg, type);
    html += `</div>`;
  }

  detailEl.innerHTML = html;
}

function closeDetail() {
  currentSlug = null;
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('detail-view').innerHTML = '';
  document.getElementById('match-list-view').style.display = '';
}

function formatMarketType(t) {
  return t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ---- Build Odds Table ----
function renderOddsTable(markets, cfg, type) {
  // Build enriched rows: each market produces 2 rows (outcome 1 & outcome 2)
  const tableRows = [];
  for (const m of markets) {
    const row1 = buildRow(m, 1, cfg);
    const row2 = buildRow(m, 2, cfg);
    tableRows.push({ question: m.question, line: m.line, m, rows: [row1, row2] });
  }

  // Build column definitions
  const cols = [
    { key: 'question', label: 'Question', sortable: false, type: 'text' },
    { key: 'line', label: 'Line', sortable: true, type: 'num' },
    { key: 'outcome', label: 'Outcome', sortable: false, type: 'text' },
  ];

  for (const book of cfg.books) {
    cols.push({ key: 'odds_' + book.key, label: book.label, sortable: true, type: 'num' });
  }
  for (const fb of cfg.fairBooks) {
    cols.push({ key: 'fair_' + fb.key, label: fb.label, sortable: true, type: 'num' });
  }

  cols.push({ key: 'blendedOdds', label: 'Blended Odds', sortable: true, type: 'num' });
  if (cfg.fairBooks.length > 0) {
    cols.push({ key: 'blendedFair', label: 'Blended Fair', sortable: true, type: 'num' });
  }
  cols.push({ key: 'oddsRange', label: 'Odds Range', sortable: true, type: 'num' });
  if (cfg.fairBooks.length > 0) {
    cols.push({ key: 'fairRange', label: 'Fair Range', sortable: true, type: 'num' });
  }
  if (cfg.hasProbs) {
    cols.push({ key: 'origProb', label: 'Orig Prob %', sortable: true, type: 'num' });
    cols.push({ key: 'fairProb', label: 'Fair Prob %', sortable: true, type: 'num' });
  }
  if (cfg.hasWinner) {
    cols.push({ key: 'winner', label: 'Winner', sortable: false, type: 'text' });
  }

  const tableId = 'tbl-' + type + '-' + Math.random().toString(36).slice(2, 8);

  let html = `<div class="table-wrapper"><table class="odds-table" id="${tableId}"><thead><tr>`;
  for (const col of cols) {
    html += `<th data-col="${col.key}" ${col.sortable ? `onclick="sortTable('${tableId}', '${col.key}', '${col.type}')"` : ''}>${col.label}${col.sortable ? '<span class="sort-arrow"></span>' : ''}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (let i = 0; i < tableRows.length; i++) {
    const tr = tableRows[i];
    const isLast = i === tableRows.length - 1;
    const groupClass = !isLast ? '' : ' group-row';

    for (let r = 0; r < 2; r++) {
      const row = tr.rows[r];
      html += `<tr class="${r === 1 ? groupClass : ''}" data-sort-group="${i}">`;

      for (const col of cols) {
        if (col.key === 'question') {
          if (r === 0) {
            html += `<td class="question-cell" rowspan="2">${escHtml(tr.question || '')}</td>`;
          }
          continue;
        }
        if (col.key === 'line') {
          if (r === 0) {
            html += `<td class="line-cell" rowspan="2">${tr.line != null ? tr.line : '-'}</td>`;
          }
          continue;
        }
        if (col.key === 'outcome') {
          html += `<td class="outcome-cell">${escHtml(row.outcome)}</td>`;
          continue;
        }
        if (col.key === 'winner') {
          if (r === 0) {
            html += `<td rowspan="2" style="color:var(--green);font-weight:600">${escHtml(tr.m.winning_outcome || '-')}</td>`;
          }
          continue;
        }

        const val = row[col.key];
        let cls = 'odds-val';
        let display = '-';

        if (val != null) {
          if (col.key === 'oddsRange') {
            display = row.oddsRangeMin != null ? row.oddsRangeMin.toFixed(2) + '-' + row.oddsRangeMax.toFixed(2) : val.toFixed(2);
            if (val > CFG.threshold) cls = 'highlight-red';
          } else if (col.key === 'fairRange') {
            display = row.fairRangeMin != null ? row.fairRangeMin.toFixed(2) + '-' + row.fairRangeMax.toFixed(2) : val.toFixed(2);
            if (val > CFG.threshold) cls = 'highlight-red';
          } else if (col.key === 'origProb' || col.key === 'fairProb') {
            display = val.toFixed(1) + '%';
            cls = 'prob-cell';
          } else {
            display = val.toFixed(2);
          }
        } else {
          cls = 'null-val';
        }

        html += `<td class="${cls}" data-val="${val != null ? val : ''}">${display}</td>`;
      }
      html += '</tr>';
    }
  }

  html += '</tbody></table></div>';
  return html;
}

function buildRow(m, outcomeNum, cfg) {
  const prefix = 'outcome_' + outcomeNum + '_';
  const row = {
    outcome: m[prefix + 'name'] || '',
  };

  // Book odds
  const oddsVals = [];
  for (const book of cfg.books) {
    const val = m[book['col' + outcomeNum]];
    row['odds_' + book.key] = val;
    if (val != null) oddsVals.push(val);
  }

  // Fair values
  const fairVals = [];
  for (const fb of cfg.fairBooks) {
    const val = m[fb['col' + outcomeNum]];
    row['fair_' + fb.key] = val;
    if (val != null) fairVals.push(val);
  }

  // Blended odds = avg of non-null book odds
  row.blendedOdds = oddsVals.length > 0 ? oddsVals.reduce((s, v) => s + v, 0) / oddsVals.length : null;

  // Blended fair = avg of non-null fair values
  row.blendedFair = fairVals.length > 0 ? fairVals.reduce((s, v) => s + v, 0) / fairVals.length : null;

  // Odds range: store min, max, and spread for display + highlighting
  if (oddsVals.length > 1) {
    row.oddsRangeMin = Math.min(...oddsVals);
    row.oddsRangeMax = Math.max(...oddsVals);
    row.oddsRange = row.oddsRangeMax - row.oddsRangeMin;
  } else if (oddsVals.length === 1) {
    row.oddsRangeMin = oddsVals[0]; row.oddsRangeMax = oddsVals[0]; row.oddsRange = 0;
  } else {
    row.oddsRangeMin = null; row.oddsRangeMax = null; row.oddsRange = null;
  }

  // Fair range
  if (fairVals.length > 1) {
    row.fairRangeMin = Math.min(...fairVals);
    row.fairRangeMax = Math.max(...fairVals);
    row.fairRange = row.fairRangeMax - row.fairRangeMin;
  } else if (fairVals.length === 1) {
    row.fairRangeMin = fairVals[0]; row.fairRangeMax = fairVals[0]; row.fairRange = 0;
  } else {
    row.fairRangeMin = null; row.fairRangeMax = null; row.fairRange = null;
  }

  // Probabilities (NFL only)
  if (cfg.hasProbs) {
    row.origProb = m[prefix + 'original_prob'];
    row.fairProb = m[prefix + 'fair_prob'];
  }

  return row;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---- Sorting ----
let sortState = {}; // tableId -> { col, dir }

function sortTable(tableId, colKey, colType) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));

  // Group rows in pairs (outcome 1 + outcome 2)
  const groups = [];
  let i = 0;
  while (i < rows.length) {
    const g = parseInt(rows[i].dataset.sortGroup);
    const pair = [rows[i]];
    if (i + 1 < rows.length && parseInt(rows[i + 1].dataset.sortGroup) === g) {
      pair.push(rows[i + 1]);
      i += 2;
    } else {
      i++;
    }
    groups.push(pair);
  }

  // Determine sort direction
  const prev = sortState[tableId];
  let dir = 'asc';
  if (prev && prev.col === colKey) {
    dir = prev.dir === 'asc' ? 'desc' : 'asc';
  }
  sortState[tableId] = { col: colKey, dir };

  // Find column index
  const ths = Array.from(table.querySelectorAll('thead th'));
  const colIdx = ths.findIndex(th => th.dataset.col === colKey);
  if (colIdx === -1) return;

  // Update arrow indicators
  ths.forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = '';
  });
  const activeArrow = ths[colIdx].querySelector('.sort-arrow');
  if (activeArrow) activeArrow.textContent = dir === 'asc' ? ' \u25B2' : ' \u25BC';

  // Extract sort values from the first row of each group
  // For rowspan cells (question, line), they appear in the first row
  groups.sort((a, b) => {
    let valA = getSortVal(a[0], colIdx, colType);
    let valB = getSortVal(b[0], colIdx, colType);

    if (valA == null && valB == null) return 0;
    if (valA == null) return 1;
    if (valB == null) return -1;

    if (colType === 'num') {
      return dir === 'asc' ? valA - valB : valB - valA;
    }
    return dir === 'asc' ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
  });

  // Re-append rows
  for (const pair of groups) {
    for (const row of pair) {
      tbody.appendChild(row);
    }
  }
}

function getSortVal(row, colIdx, colType) {
  // First row of each pair has all cells (including rowspan cells),
  // so cell index matches column index directly
  const cells = row.querySelectorAll('td');
  const cell = cells[colIdx];
  if (!cell) return null;

  if (colType === 'num') {
    const dv = cell.dataset.val;
    if (dv !== undefined && dv !== '') return parseFloat(dv);
    const text = cell.textContent.replace('%', '').trim();
    const num = parseFloat(text);
    return isNaN(num) ? null : num;
  }
  return cell.textContent.trim();
}

// ---- Sport Switching ----
async function switchSport(key) {
  if (key === activeSport && sportData[key]) {
    // If already on this sport and in detail, go back to list
    if (currentSlug) {
      closeDetail();
      return;
    }
    return;
  }

  activeSport = key;
  closeDetail();
  renderTabs();

  if (!sportData[key]) {
    showLoading(true);
    try {
      await loadSport(key);
      renderTabs(); // Update badge counts
    } catch (err) {
      document.getElementById('match-list-view').innerHTML = `<div class="notice" style="color:var(--red)">Error loading ${SPORTS[key].label}: ${err.message}</div>`;
      document.getElementById('match-list-view').style.display = '';
      showLoading(false);
      return;
    }
    showLoading(false);
  }

  renderMatchList();
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? '' : 'none';
  if (!show) document.getElementById('match-list-view').style.display = '';
}

// ---- Auto Refresh ----
function resetRefreshTimer() {
  if (refreshTimer) clearInterval(refreshTimer);
  countdown = CFG.refreshInterval;
  document.getElementById('refresh-countdown').textContent = countdown + 's';
  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('refresh-countdown').textContent = countdown + 's';
    if (countdown <= 0) {
      silentReload();
      countdown = CFG.refreshInterval;
    }
  }, 1000);
}

async function silentReload() {
  const key = activeSport;
  try {
    await loadSport(key);
    renderTabs();
    if (currentSlug) {
      // Re-render detail if open
      openDetail(currentSlug);
    } else {
      renderMatchList();
    }
  } catch (e) {
    console.warn('Silent reload failed:', e);
  }
}

// ---- Init ----
async function init() {
  renderTabs();
  showLoading(true);

  // Load all sports in parallel for badge counts
  const keys = Object.keys(SPORTS);
  const results = await Promise.allSettled(keys.map(k => loadSport(k)));

  results.forEach((r, i) => {
    if (r.status === 'rejected') {
      console.warn(`Failed to load ${keys[i]}:`, r.reason);
    }
  });

  renderTabs();
  showLoading(false);

  // Default to sport with most upcoming, preferring NHL
  let best = 'nhl';
  let bestCount = upcomingCounts['nhl'] || 0;
  for (const k of keys) {
    if ((upcomingCounts[k] || 0) > bestCount) {
      best = k;
      bestCount = upcomingCounts[k];
    }
  }
  activeSport = best;
  renderTabs();
  renderMatchList();
  resetRefreshTimer();
}

init().catch(err => {
  document.getElementById('loading').innerHTML = `<div style="color:var(--red)">Error: ${err.message}</div>`;
  console.error(err);
});
</script>
